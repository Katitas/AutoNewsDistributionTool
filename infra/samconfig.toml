# SAM CLI 設定ファイル
# 使用例: sam deploy --config-env stg
# 詳細: https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/serverless-sam-cli-config.html

version = 0.1

# -------------------- 共通設定 --------------------
[default.global.parameters]
region = "ap-northeast-1"

[default.build.parameters]
parallel = true
cached = true

[default.validate.parameters]
lint = true

[default.local_invoke.parameters]
event = "events/scheduled.json"

# -------------------- STG 環境 --------------------
[stg.deploy.parameters]
stack_name = "auto-news-stg"
region = "ap-northeast-1"
resolve_s3 = true
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
fail_on_empty_changeset = false
parameter_overrides = "Environment=\"stg\" AlertEmailAddress=\"admin@katitas.jp\" SenderEmailAddress=\"news@katitas.jp\""
# CFn がスタック内の全 Tag 対応リソースに自動伝播する。
# Cost Explorer で集計するためには Billing コンソールで Cost Allocation Tag として有効化する必要あり。
tags = "Project=\"AutoNewsDistribution\" Environment=\"stg\" CostCenter=\"katitas-it-newsfeed\" ManagedBy=\"SAM\""

# -------------------- 本番環境 --------------------
[prod.deploy.parameters]
stack_name = "auto-news-prod"
region = "ap-northeast-1"
resolve_s3 = true
capabilities = "CAPABILITY_IAM"
confirm_changeset = true   # 本番は変更セット目視確認を強制
fail_on_empty_changeset = false
parameter_overrides = "Environment=\"prod\" AlertEmailAddress=\"admin@katitas.jp\" SenderEmailAddress=\"news@katitas.jp\""
tags = "Project=\"AutoNewsDistribution\" Environment=\"prod\" CostCenter=\"katitas-it-newsfeed\" ManagedBy=\"SAM\""
